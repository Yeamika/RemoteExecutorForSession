name: Build Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    name: ${{ matrix.package }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: refs-linux-x86_64
            ptyt_package: refs-ptyt-linux-x86_64
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            package: refs-linux-x86_64-musl-static
            ptyt_package: refs-ptyt-linux-x86_64-musl-static
            cross: true
          - os: ubuntu-latest
            target: i686-unknown-linux-musl
            package: refs-linux-i686-musl-static
            ptyt_package: refs-ptyt-linux-i686-musl-static
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package: refs-linux-aarch64
            ptyt_package: refs-ptyt-linux-aarch64
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            package: refs-linux-aarch64-musl-static
            ptyt_package: refs-ptyt-linux-aarch64-musl-static
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            package: refs-linux-armv7-musl-static
            ptyt_package: refs-ptyt-linux-armv7-musl-static
            cross: true
          - os: ubuntu-latest
            target: aarch64-linux-android
            package: refs-termux-aarch64
            ptyt_package: refs-ptyt-termux-aarch64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: refs-windows-x86_64
            ptyt_package: refs-ptyt-windows-x86_64
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Configure Android linker
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          set -euo pipefail
          ndk="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [[ -z "$ndk" ]]; then
            sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
            ndk="$(find "$sdk/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          fi
          linker="$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          test -x "$linker"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$linker" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$linker" >> "$GITHUB_ENV"

      - name: Build with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Smoke test native Linux binaries
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release"
          "$bin/refs-ptyt" --help >/tmp/refs-ptyt-help.txt
          printf '' | "$bin/rec_mcp_memory_server" >/tmp/refs-stdio.out 2>&1
          set +e
          timeout 5s "$bin/rec_mcp_memory_ws_server" >/tmp/refs-ws.out 2>&1
          code=$?
          set -e
          if [[ "$code" != "124" ]]; then
            cat /tmp/refs-ws.out
            exit "$code"
          fi
          grep -q 'ws://127.0.0.1:' /tmp/refs-ws.out

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          pkg="${{ matrix.package }}"
          ptyt_pkg="${{ matrix.ptyt_package }}"
          mkdir -p "dist/${pkg}" "dist/${ptyt_pkg}"
          cp "target/${target}/release/rec_mcp_demo" "dist/${pkg}/"
          cp "target/${target}/release/rec_mcp_memory_server" "dist/${pkg}/"
          cp "target/${target}/release/rec_mcp_memory_ws_server" "dist/${pkg}/"
          cp AGENTS.md MCP.md "dist/${pkg}/"
          cp "target/${target}/release/refs-ptyt" "dist/${ptyt_pkg}/"
          cp AGENTS.md MCP.md "dist/${ptyt_pkg}/"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          tar -C dist -czf "dist/${ptyt_pkg}.tar.gz" "${ptyt_pkg}"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $pkg = "${{ matrix.package }}"
          $ptytPkg = "${{ matrix.ptyt_package }}"
          New-Item -ItemType Directory -Force "dist/$pkg" | Out-Null
          New-Item -ItemType Directory -Force "dist/$ptytPkg" | Out-Null
          Copy-Item "target/$target/release/rec_mcp_demo.exe" "dist/$pkg/"
          Copy-Item "target/$target/release/rec_mcp_memory_server.exe" "dist/$pkg/"
          Copy-Item "target/$target/release/rec_mcp_memory_ws_server.exe" "dist/$pkg/"
          Copy-Item "AGENTS.md" "dist/$pkg/"
          Copy-Item "MCP.md" "dist/$pkg/"
          Copy-Item "target/$target/release/refs-ptyt.exe" "dist/$ptytPkg/"
          Copy-Item "AGENTS.md" "dist/$ptytPkg/"
          Copy-Item "MCP.md" "dist/$ptytPkg/"
          Compress-Archive -Path "dist/$pkg/*" -DestinationPath "dist/$pkg.zip" -Force
          Compress-Archive -Path "dist/$ptytPkg/*" -DestinationPath "dist/$ptytPkg.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "" || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/${{ matrix.package }}.* dist/${{ matrix.ptyt_package }}.* --clobber
