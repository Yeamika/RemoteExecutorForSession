name: build-refs-opencode-napi

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "refs-opencode-napi/**"
      - ".github/workflows/build-refs-opencode-napi.yml"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            package: refs-opencode-linux-x64-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            package: refs-opencode-linux-arm64-gnu
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            package: refs-opencode-linux-x64-musl
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            package: refs-opencode-linux-arm64-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: refs-opencode-windows-x64-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            package: refs-opencode-windows-arm64-msvc
          - os: macos-14
            target: x86_64-apple-darwin
            package: refs-opencode-darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            package: refs-opencode-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross tools
        if: runner.os == 'Linux' && contains(matrix.target, 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install dependencies
        working-directory: refs-opencode-napi
        run: bun install

      - name: Build native addon
        working-directory: refs-opencode-napi
        shell: bash
        run: bunx napi build --platform --release --target ${{ matrix.target }}

      - name: Stage native addon
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.package }}"
          cp refs-opencode-napi/refs-opencode.*.node "dist/${{ matrix.package }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}
          path: dist/${{ matrix.package }}
          if-no-files-found: error

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="refs-opencode-napi-latest"
          gh release delete "$tag" --cleanup-tag --yes || true
          mapfile -t assets < <(find dist -type f -name 'refs-opencode.*.node' | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No REFS-opencode native addons found" >&2
            exit 1
          fi
          gh release create "$tag" "${assets[@]}" \
            --title "REFS opencode napi latest" \
            --notes "Rolling native addon build for opencode embedding."
